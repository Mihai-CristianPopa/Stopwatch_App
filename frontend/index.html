<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Top bar — only visible when authenticated -->
  <header id="app-header" hidden>
    <nav>
      <button id="nav-stopwatch" class="nav-btn active" data-tab="stopwatch">Stopwatch</button>
      <button id="nav-history" class="nav-btn" data-tab="history">History</button>
      <button id="nav-library" class="nav-btn" data-tab="library">Library</button>
    </nav>
    <div class="header-user">
      <span id="user-email"></span>
      <button id="logout-btn" class="btn-secondary">Logout</button>
    </div>
  </header>

  <!-- Loading view — shown during backend resolve + auth check -->
  <main id="loading-view">
    <div class="loading-spinner-wrap">
      <div class="loading-spinner"></div>
    </div>
  </main>

  <!-- Auth view -->
  <main id="auth-view" hidden>
    <div class="card auth-card">
      <h1>Stopwatch Tracker</h1>

      <!-- Login form -->
      <form id="login-form">
        <h2>Log in</h2>
        <label>Email
          <input type="email" id="login-email" required autocomplete="email" />
        </label>
        <label>Password
          <input type="password" id="login-password" required autocomplete="current-password" />
        </label>
        <button type="submit">Log in</button>
        <p class="form-switch">No account? <button type="button" id="show-register" class="link-btn">Register</button></p>
      </form>

      <!-- Register form -->
      <form id="register-form" hidden>
        <h2>Create account</h2>
        <label>Email
          <input type="email" id="register-email" required autocomplete="email" />
        </label>
        <label>Password
          <input type="password" id="register-password" required autocomplete="new-password" />
        </label>
        <label>Confirm password
          <input type="password" id="register-confirm" required autocomplete="new-password" />
        </label>
        <button type="submit">Create account</button>
        <p class="form-switch">Already have an account? <button type="button" id="show-login" class="link-btn">Log in</button></p>
      </form>

      <p id="email-confirmation-screen" hidden>Your registration was successful, an email has been sent to your account.</p>

      <p id="auth-error" class="error-msg" hidden></p>
    </div>
  </main>

  <!-- Stopwatch view -->
  <main id="stopwatch-view" hidden>
    <div class="card stopwatch-card">
      <div id="stopwatch-display" class="display">00:00:00</div>
      <div id="today-total" class="today-total" hidden>
        <span class="today-total-label">Today</span>
        <span id="today-total-value" class="today-total-value">0m</span>
      </div>
      <div class="stopwatch-controls">
        <button id="start-btn" class="btn-primary btn-large">Start</button>
        <button id="stop-btn" class="btn-stop btn-large" hidden>Stop</button>
      </div>
    </div>
    <div id="stopwatch-toast" class="toast"></div>
  </main>

  <!-- Daily totals view -->
  <main id="daily-totals-view" hidden>
    <div class="card">
      <div class="totals-header">
        <h2 id="history-heading">Last 7 Days</h2>
        <span id="aggregation-total" class="aggregation-total" hidden></span>
      </div>
      <div class="range-controls">
        <div class="preset-buttons">
          <button class="date-range-btn preset-btn active" data-preset="7d">Last 7 Days</button>
          <button class="date-range-btn preset-btn" data-preset="30d">Last 30 Days</button>
          <button class="date-range-btn preset-btn" data-preset="month">This Month</button>
          <button class="date-range-btn preset-btn" data-preset="ytd">Year to Date</button>
          <button class="date-range-btn preset-btn" data-preset="365d">Last 365 Days</button>
          <button class="date-range-btn preset-btn" data-preset="custom">Custom</button>
        </div>
        <div id="custom-range" hidden>
          <input type="date" id="custom-from" />
          <span class="custom-range-sep">to</span>
          <input type="date" id="custom-to" />
          <button id="apply-range-btn" class="btn-primary" disabled>Apply</button>
        </div>
      </div>
      <nav id="drill-breadcrumb" class="drill-breadcrumb" hidden></nav>
      <ul id="daily-totals-list" class="totals-list"></ul>
    </div>
  </main>

  <!-- Library view -->
  <main id="library-view" hidden>
    <div class="card library-card">
      <div class="totals-header">
        <h2>Library</h2>
        <button id="add-book-btn" class="btn-primary">Add book</button>
      </div>
      <div class="preset-buttons library-tabs">
        <button class="library-tab-btn preset-btn active" data-tab="wishlist">Wishlist</button>
        <button class="library-tab-btn preset-btn" data-tab="read">Read</button>
      </div>
      <ul id="book-list" class="book-list"></ul>
      <div id="book-pagination" class="book-pagination" hidden>
        <button type="button" id="page-prev-btn" class="reorder-btn" aria-label="Previous page">◀</button>
        <span id="page-indicator"></span>
        <button type="button" id="page-next-btn" class="reorder-btn" aria-label="Next page">▶</button>
        <label class="page-size-label">Per page
          <select id="page-size-select">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="20">50</option>
            <option value="20">100</option>
          </select>
        </label>
      </div>
    </div>
  </main>

  <!-- Add / Edit book dialog -->
  <dialog id="book-form-dialog" class="book-dialog">
    <form id="book-form" method="dialog">
      <h3 id="book-form-title">Add book</h3>
      <input type="hidden" id="book-id" />
      <div id="book-status-toggle" class="preset-buttons book-status-toggle">
        <button type="button" class="book-status-btn preset-btn active" data-status="wishlist">Wishlist</button>
        <button type="button" class="book-status-btn preset-btn" data-status="read">Read</button>
      </div>
      <label><span class="label-text">Title <span class="req">*</span></span><input type="text" id="book-title" required maxlength="300" /></label>
      <label><span class="label-text">Author <span class="req">*</span></span><input type="text" id="book-author" required maxlength="300" /></label>
      <label>Cover image URL <input type="text" id="book-image-url" /></label>
      <label>Source <input type="text" id="book-source" placeholder="e.g. Bookster, Online, Owned" /></label>
      <div id="book-read-fields" hidden>
        <label>Date read precision
          <select id="book-date-precision">
            <option value="day">Full date</option>
            <option value="month">Month &amp; year</option>
            <option value="year">Year only</option>
          </select>
        </label>
        <label id="book-date-read-label">Date read <input type="date" id="book-date-read" /></label>
        <label id="book-date-read-month-label" hidden>Month read <input type="month" id="book-date-read-month" /></label>
        <label id="book-date-read-year-label" hidden>Year read <input type="number" id="book-date-read-year" min="1000" max="9999" placeholder="YYYY" /></label>
        <label>Rating
          <select id="book-rating">
            <option value="">— no rating —</option>
            <option value="1">1 ★</option>
            <option value="2">2 ★★</option>
            <option value="3">3 ★★★</option>
            <option value="4">4 ★★★★</option>
            <option value="5">5 ★★★★★</option>
          </select>
        </label>
      </div>
      <label>Notes <textarea id="book-notes" rows="3"></textarea></label>
      <p id="book-form-error" class="error-msg" hidden></p>
      <div class="dialog-actions">
        <button type="button" id="book-form-cancel" class="btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </dialog>

  <!-- Book detail dialog -->
  <dialog id="book-detail-dialog" class="book-dialog">
    <div class="book-detail">
      <div id="detail-cover"></div>
      <h3 id="detail-title"></h3>
      <p id="detail-author" class="book-detail-author"></p>
      <p id="detail-source" class="book-detail-source" hidden></p>
      <div id="detail-rating" class="star-rating" hidden></div>
      <p id="detail-notes" class="book-detail-notes" hidden></p>
      <button type="button" id="detail-notes-toggle" class="link-btn" hidden>Show more</button>
      <div class="dialog-actions">
        <button type="button" id="detail-edit-btn" class="btn-secondary">Edit</button>
        <button type="button" id="detail-close-btn" class="btn-primary">Close</button>
      </div>
    </div>
  </dialog>

  <!-- Mark as Read confirmation dialog -->
  <dialog id="mark-read-confirm-dialog" class="book-dialog confirm-dialog">
    <h3 id="mark-read-book-title" class="confirm-dialog-title"></h3>
    <p>Move this book to your Read list?</p>
    <div class="confirm-dialog-optional">
      <label><span class="label-text">Rating (optional)</span>
        <select id="confirm-rating">
          <option value="">— no rating —</option>
          <option value="1">1 ★</option>
          <option value="2">2 ★★</option>
          <option value="3">3 ★★★</option>
          <option value="4">4 ★★★★</option>
          <option value="5">5 ★★★★★</option>
        </select>
      </label>
      <label><span class="label-text">Notes (optional)</span>
        <textarea id="confirm-notes" rows="3"></textarea>
      </label>
    </div>
    <div class="dialog-actions">
      <button type="button" id="confirm-mark-read-no" class="btn-secondary">Cancel</button>
      <button type="button" id="confirm-mark-read-yes" class="btn-primary">Mark as Read</button>
    </div>
  </dialog>

  <script type="module" src="js/app.js"></script>
</body>
</html>
